<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background: transparent;
    }
    
    .container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 24px;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    /* 几何图形背景动画 */
    .geometric-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.7;
    }
    
    .shape {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,105,180,0.4), rgba(0,191,255,0.4));
      animation: float 8s infinite ease-in-out;
    }
    
    .shape:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 10%;
      animation-delay: 0s;
      background: linear-gradient(135deg, rgba(255,105,180,0.5), rgba(255,20,147,0.3));
    }
    
    .shape:nth-child(2) {
      width: 60px;
      height: 60px;
      top: 60%;
      left: 15%;
      animation-delay: 1s;
      background: linear-gradient(135deg, rgba(0,191,255,0.5), rgba(30,144,255,0.3));
      border-radius: 10px;
    }
    
    .shape:nth-child(3) {
      width: 100px;
      height: 100px;
      top: 30%;
      right: 10%;
      animation-delay: 2s;
      background: linear-gradient(135deg, rgba(50,205,50,0.5), rgba(0,255,127,0.3));
      border-radius: 0;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }
    
    .shape:nth-child(4) {
      width: 70px;
      height: 70px;
      bottom: 20%;
      right: 20%;
      animation-delay: 3s;
      background: linear-gradient(135deg, rgba(255,215,0,0.5), rgba(255,140,0,0.3));
      border-radius: 20px;
    }
    
    .shape:nth-child(5) {
      width: 90px;
      height: 90px;
      top: 10%;
      left: 40%;
      animation-delay: 4s;
      background: linear-gradient(135deg, rgba(138,43,226,0.5), rgba(75,0,130,0.3));
      border-radius: 50%;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 0.7;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }
    
    @keyframes slideIn {
      0% {
        opacity: 0;
        transform: translateX(-30px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    /* 内容区域 */
    .content {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: slideIn 0.8s ease-out;
    }
    
    .tag {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.9;
      color: #ff69b4;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff69b4, #00bfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 3s infinite;
    }
    
    .subtitle {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.4;
      margin-bottom: 12px;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }
    
    .info-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      border-left: 3px solid #00bfff;
    }
    
    .info-label {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 14px;
      font-weight: 600;
    }
    
    /* 连接线动画 */
    .connector {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff69b4, transparent);
      z-index: 0;
      animation: connectorFlow 4s infinite linear;
    }
    
    @keyframes connectorFlow {
      0% {
        opacity: 0;
        width: 0;
      }
      50% {
        opacity: 1;
        width: 100px;
      }
      100% {
        opacity: 0;
        width: 0;
        transform: translateX(100px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 几何图形背景 -->
    <div class="geometric-background">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>
    
    <!-- 连接线 -->
    <div class="connector" style="top: 30%; left: 20%;"></div>
    <div class="connector" style="top: 60%; right: 25%; animation-delay: 1s;"></div>
    <div class="connector" style="bottom: 30%; left: 40%; animation-delay: 2s;"></div>
    
    <!-- 主要内容 -->
    <div class="content">
      <div class="tag">GEOMETRIC ANIMATION PRESET</div>
      <div class="title">集合图形动画演示</div>
      <div class="subtitle">这是一个包含多种几何图形组合的动画预设，包含圆形、方形、三角形等元素的动态效果。</div>
      
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">动画类型</div>
          <div class="info-value">几何图形浮动</div>
        </div>
        <div class="info-item">
          <div class="info-label">包含图形</div>
          <div class="info-value">5种几何形状</div>
        </div>
        <div class="info-item">
          <div class="info-label">颜色主题</div>
          <div class="info-value">渐变彩虹色</div>
        </div>
        <div class="info-item">
          <div class="info-label">动画时长</div>
          <div class="info-value">8秒循环</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 动态调整图形位置
    document.addEventListener('DOMContentLoaded', function() {
      const shapes = document.querySelectorAll('.shape');
      const connectors = document.querySelectorAll('.connector');
      
      // 为每个图形添加随机动画延迟
      shapes.forEach((shape, index) => {
        const randomDelay = Math.random() * 2;
        shape.style.animationDelay = `${randomDelay}s`;
      });
      
      // 动态创建更多连接线
      for (let i = 0; i < 3; i++) {
        const connector = document.createElement('div');
        connector.className = 'connector';
        connector.style.top = `${Math.random() * 80 + 10}%`;
        connector.style.left = `${Math.random() * 80 + 10}%`;
        connector.style.animationDelay = `${Math.random() * 3}s`;
        document.querySelector('.container').appendChild(connector);
      }
    });
  </script>
</body>
</html>
