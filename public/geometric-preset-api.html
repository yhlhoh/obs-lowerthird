<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      background: transparent;
    }
    
    .preset-container {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 15px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    
    /* 几何网格背景 */
    .grid-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(90deg, rgba(255,105,180,0.05) 1px, transparent 1px) 0 0 / 50px 50px,
        linear-gradient(rgba(0,191,255,0.05) 1px, transparent 1px) 0 0 / 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }
    
    @keyframes gridMove {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 50px 50px;
      }
    }
    
    /* 浮动几何体 */
    .floating-geometry {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    .geo-element {
      position: absolute;
      opacity: 0.4;
      filter: blur(0.5px);
      mix-blend-mode: screen;
    }
    
    /* 内容面板 */
    .content-panel {
      position: relative;
      z-index: 2;
      background: rgba(15, 20, 30, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      max-width: 400px;
      min-width: 320px;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    
    .panel-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .geo-badge {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #ff69b4, #00bfff);
      border-radius: 10px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transform: rotate(45deg);
      animation: badgeRotate 8s infinite linear;
    }
    
    .geo-badge span {
      transform: rotate(-45deg);
    }
    
    @keyframes badgeRotate {
      0% {
        transform: rotate(45deg);
      }
      100% {
        transform: rotate(405deg);
      }
    }
    
    .header-text {
      flex: 1;
    }
    
    .preset-name {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #ff69b4, #00bfff, #9d4edd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    
    .preset-tag {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9d4edd;
      font-weight: 600;
    }
    
    .preset-description {
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.9;
      margin-bottom: 20px;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .feature {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }
    
    .feature:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      border-color: rgba(255, 105, 180, 0.3);
    }
    
    .feature-icon {
      font-size: 20px;
      margin-bottom: 6px;
      opacity: 0.8;
    }
    
    .feature-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .feature-desc {
      font-size: 11px;
      opacity: 0.7;
      line-height: 1.3;
    }
    
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: statusPulse 2s infinite;
    }
    
    @keyframes statusPulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
      }
      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 6px rgba(0, 255, 136, 0);
      }
    }
    
    .status-text {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .timestamp {
      font-size: 11px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="preset-container">
    <!-- 网格背景 -->
    <div class="grid-background"></div>
    
    <!-- 浮动几何体 -->
    <div class="floating-geometry" id="floatingGeo"></div>
    
    <!-- 内容面板 -->
    <div class="content-panel">
      <div class="panel-header">
        <div class="geo-badge">
          <span>◈</span>
        </div>
        <div class="header-text">
          <div class="preset-name">几何集合动画</div>
          <div class="preset-tag">ANIMATED GEOMETRY PRESET</div>
        </div>
      </div>
      
      <div class="preset-description">
        专为OBS设计的动态几何图形动画预设，包含多种形状的3D浮动效果和交互式元素，适合科技展示、创意直播等场景。
      </div>
      
      <div class="features-grid">
        <div class="feature">
          <div class="feature-icon">●</div>
          <div class="feature-title">动态图形</div>
          <div class="feature-desc">12种几何形状随机生成，实时动画效果</div>
        </div>
        <div class="feature">
          <div class="feature-icon">■</div>
          <div class="feature-title">渐变色彩</div>
          <div class="feature-desc">彩虹渐变配色方案，支持自定义调整</div>
        </div>
        <div class="feature">
          <div class="feature-icon">▲</div>
          <div class="feature-title">3D透视</div>
          <div class="feature-desc">CSS 3D变换效果，增强视觉层次感</div>
        </div>
        <div class="feature">
          <div class="feature-icon">◆</div>
          <div class="feature-title">响应交互</div>
          <div class="feature-desc">鼠标悬停效果，增强用户参与感</div>
        </div>
      </div>
      
      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <div class="status-text">动画运行中</div>
        </div>
        <div class="timestamp" id="timeDisplay">15:30</div>
      </div>
    </div>
  </div>
  
  <script>
    // 初始化时间显示
    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
    }
    
    // 创建浮动几何体
    function createFloatingGeometry() {
      const container = document.getElementById('floatingGeo');
      const shapes = ['circle', 'square', 'triangle', 'diamond', 'pentagon'];
      const colors = [
        'rgba(255,105,180,0.25)',
        'rgba(0,191,255,0.25)',
        'rgba(50,205,50,0.25)',
        'rgba(255,215,0,0.25)',
        'rgba(138,43,226,0.25)',
        'rgba(255,69,0,0.25)',
        'rgba(64,224,208,0.25)',
        'rgba(255,20,147,0.25)'
      ];
      
      // 创建15个几何体
      for (let i = 0; i < 15; i++) {
        const element = document.createElement('div');
        element.className = 'geo-element';
        
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 80 + 20;
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 5;
        
        // 设置基本样式
        element.style.width = `${size}px`;
        element.style.height = `${size}px`;
        element.style.left = `${left}%`;
        element.style.top = `${top}%`;
        element.style.background = color;
        element.style.animation = `float3D ${duration}s infinite ease-in-out ${delay}s`;
        
        // 根据形状设置不同的样式
        switch(shape) {
          case 'circle':
            element.style.borderRadius = '50%';
            element.style.background = `radial-gradient(circle at 30% 30%, ${color}, transparent 70%)`;
            break;
          case 'square':
            element.style.borderRadius = '8px';
            element.style.transform = 'rotate(45deg)';
            break;
          case 'triangle':
            element.style.width = '0';
            element.style.height = '0';
            element.style.background = 'none';
            element.style.borderLeft = `${size/2}px solid transparent`;
            element.style.borderRight = `${size/2}px solid transparent`;
            element.style.borderBottom = `${size}px solid ${color}`;
            break;
          case 'diamond':
            element.style.transform = 'rotate(45deg)';
            element.style.borderRadius = '4px';
            break;
          case 'pentagon':
            element.style.clipPath = 'polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)';
            break;
        }
        
        // 添加3D浮动动画
        const keyframes = `
          @keyframes float3D_${i} {
            0%, 100% {
              transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg);
              opacity: 0.3;
            }
            25% {
              transform: translate3d(20px, -30px, 50px) rotateX(90deg) rotateY(90deg);
              opacity: 0.6;
            }
            50% {
              transform: translate3d(-20px, 20px, -30px) rotateX(180deg) rotateY(180deg);
              opacity: 0.4;
            }
            75% {
              transform: translate3d(30px, 10px, 20px) rotateX(270deg) rotateY(270deg);
              opacity: 0.7;
            }
          }
        `;
        
        // 动态添加关键帧
        const style = document.createElement('style');
        style.textContent = keyframes;
        document.head.appendChild(style);
        
        element.style.animation = `float3D_${i} ${duration}s infinite ease-in-out ${delay}s`;
        
        container.appendChild(element);
      }
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      updateTime();
      createFloatingGeometry();
      
      // 更新时间
      setInterval(updateTime, 60000);
      
      // 添加面板悬停效果
      const panel = document.querySelector('.content-panel');
      panel.addEventListener('mouseenter', function() {
        this.style.transform = 'translateZ(20px) rotateX(2deg) rotateY(-2deg)';
        this.style.boxShadow = 
          '0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15)';
      });
      
      panel.addEventListener('mouseleave', function() {
        this.style.transform = 'translateZ(0) rotateX(0deg) rotateY(0deg)';
        this.style.boxShadow = 
          '0 10px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1)';
      });
    });
  </script>
</body>
</html>
